---
name: CI neatnet-rs

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - "*"

jobs:
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neatnet-rs

      - name: Run tests
        run: cargo test --workspace
        working-directory: neatnet-rs

  python-tests:
    name: Python roundtrip tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies and build neatnet-rs
        run: |
          uv venv
          uv pip install -e '.[dev]' maturin
          . .venv/bin/activate && maturin develop --release
        working-directory: neatnet-rs/crates/neatnet-py

      - name: Run Python tests
        run: uv run pytest tests/ -v --color yes
        working-directory: neatnet-rs/crates/neatnet-py
